<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Chinese New Year Exclusive Jacket - Algeria Edition</title>

<style>
    body {
        margin: 0;
        font-family: Arial, sans-serif;
        background-color: #f4f4f4;
    }

    header {
        background: linear-gradient(to right, #006233, #ffffff, #d21034);
        padding: 20px;
        text-align: center;
        color: black;
        font-weight: bold;
        font-size: 24px;
    }

    .container {
        max-width: 1100px;
        margin: 30px auto;
        display: flex;
        flex-wrap: wrap;
        gap: 30px;
        padding: 20px;
        background: white;
        border-radius: 10px;
        box-shadow: 0 5px 15px rgba(0,0,0,0.1);
    }

    .product-image {
        flex: 1;
    }

    .product-image img {
        width: 100%;
        border-radius: 10px;
    }

    .product-details {
        flex: 1;
    }

    h2 {
        color: #006233;
    }

    .price {
        font-size: 22px;
        color: #d21034;
        margin: 15px 0;
    }

    form {
        margin-top: 20px;
    }

    input, select, textarea {
        width: 100%;
        padding: 10px;
        margin: 8px 0;
        border-radius: 5px;
        border: 1px solid #ccc;
    }

    .delivery-options {
        margin-top: 10px;
    }

    .total {
        font-weight: bold;
        font-size: 18px;
        margin-top: 10px;
        color: #006233;
    }

    button {
        background-color: #d21034;
        color: white;
        padding: 12px;
        border: none;
        border-radius: 5px;
        cursor: pointer;
        font-size: 16px;
        width: 100%;
        margin-top: 10px;
    }

    button:hover {
        background-color: #a10e28;
    }

    footer {
        text-align: center;
        padding: 15px;
        background: #006233;
        color: white;
        margin-top: 30px;
    }
</style>
</head>

<body>

<header>
    🇩🇿 Chinese New Year Exclusive Jacket - Algeria Edition
</header>

<div class="container">
    <div class="product-image">
        <!-- Replace image URL with your product image -->
        <img src="https://via.placeholder.com/500x600" alt="Jacket Image">
    </div>

    <div class="product-details">
        <h2>Exclusive Jacket 2026</h2>
        <p>
            Premium limited edition jacket inspired by Chinese New Year,
            redesigned with an Algerian touch 🇩🇿.
        </p>

        <div class="price">Base Price: 8500 DA</div>

        <form onsubmit="submitOrder(event)">
            <input type="text" placeholder="Full Name" required>
            <input type="email" placeholder="Email" required>
            <input type="tel" placeholder="Phone Number" required>
            <input type="text" placeholder="Your Location (City/Wilaya)" required>

            <div class="delivery-options">
                <label><strong>Delivery Option:</strong></label>
                <select id="delivery" onchange="updateTotal()">
                    <option value="400">Office Delivery (400 DA)</option>
                    <option value="700">Home Delivery (700 DA)</option>
                </select>
            </div>

            <div class="total">
                Total: <span id="totalPrice">8900</span> DA
            </div>

            <button type="submit">Place Order</button>
        </form>
    </div>
</div>

<footer>
    Cash on Delivery Only | Delivery Available Across Algeria 🇩🇿
</footer>

<script>
    const basePrice = 8500;

    function updateTotal() {
        const delivery = parseInt(document.getElementById("delivery").value);
        const total = basePrice + delivery;
        document.getElementById("totalPrice").innerText = total;
    }

    function submitOrder(event) {
        event.preventDefault();
        alert("Order submitted successfully! We will contact you soon.");
    }

    // Initialize total on load
    updateTotal();
</script>

</body>
</html>
