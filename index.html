

  <!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>JACKETS.DZ</title>

<style>
:root{
  --gold:#d4a843;
  --dark:#111;
  --emerald:#0f3d3e;
  --bg:#f5f2ec;
}

body{
  margin:0;
  font-family:Arial, sans-serif;
  background:var(--bg);
  color:#222;
}

header{
  background:var(--dark);
  color:white;
  padding:20px;
  display:flex;
  justify-content:space-between;
  align-items:center;
}

header nav a{
  color:white;
  text-decoration:none;
  margin-left:20px;
}

.hero{
  background:url("https://images.unsplash.com/photo-1520975922321-c5b6b3b3a4f3");
  background-size:cover;
  background-position:center;
  height:400px;
  display:flex;
  align-items:center;
  justify-content:center;
  color:white;
  text-align:center;
}

.hero h1{
  background:rgba(0,0,0,0.6);
  padding:20px;
  border-radius:8px;
}

.section{
  padding:60px 20px;
  max-width:1100px;
  margin:auto;
}

.products{
  display:flex;
  flex-wrap:wrap;
  gap:20px;
  justify-content:center;
}

.product{
  background:white;
  width:260px;
  padding:15px;
  border-radius:10px;
  box-shadow:0 5px 15px rgba(0,0,0,0.1);
  text-align:center;
}

.product img{
  width:100%;
  border-radius:8px;
}

.order-box{
  background:white;
  padding:30px;
  border-radius:12px;
  box-shadow:0 5px 20px rgba(0,0,0,0.1);
}

.form-grid{
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:15px;
}

.form-group{
  display:flex;
  flex-direction:column;
}

.form-group.full{
  grid-column:1/-1;
}

input, select, textarea{
  padding:10px;
  border-radius:6px;
  border:1px solid #ccc;
}

button{
  padding:15px;
  background:var(--dark);
  color:white;
  border:none;
  border-radius:8px;
  cursor:pointer;
  font-size:16px;
}

button:hover{
  background:#333;
}

.delivery-box{
  display:flex;
  gap:10px;
  margin-top:15px;
}

.delivery-opt{
  flex:1;
  border:1px solid #ccc;
  padding:10px;
  cursor:pointer;
  text-align:center;
  border-radius:6px;
}

.delivery-opt.selected{
  border:2px solid var(--gold);
}

.total-box{
  margin-top:15px;
  font-weight:bold;
}

.success-overlay{
  position:fixed;
  top:0;
  left:0;
  width:100%;
  height:100%;
  background:rgba(0,0,0,0.7);
  display:none;
  align-items:center;
  justify-content:center;
}

.success-box{
  background:white;
  padding:30px;
  border-radius:10px;
  text-align:center;
}

@media(max-width:768px){
  .form-grid{
    grid-template-columns:1fr;
  }
  header{
    flex-direction:column;
    gap:10px;
  }
}
</style>
</head>
<body>

<header>
  <div><strong>JACKETS.DZ</strong></div>
  <nav>
    <a href="#">Accueil</a>
    <a href="#order">Commander</a>
  </nav>
</header>

<div class="hero">
  <h1>Premium Jacket Collection 2026</h1>
</div>

<section class="section">
  <h2>Our Collection</h2>
  <div class="products">
    <div class="product">
      <img src="https://images.unsplash.com/photo-1544441893-675973e31985">
      <h3>Classic Edition</h3>
    </div>
    <div class="product">
      <img src="https://images.unsplash.com/photo-1520975918318-6f9d66bdfc3f">
      <h3>Winter Edition</h3>
    </div>
  </div>
</section>

<section class="section" id="order">
  <h2>Passer votre commande</h2>

  <div class="order-box">
    <form onsubmit="submitOrder(event)">
      <div class="form-grid">

        <div class="form-group">
          <label>Nom complet</label>
          <input type="text" id="fname" required>
        </div>

        <div class="form-group">
          <label>Téléphone</label>
          <input type="tel" id="fphone" required>
        </div>

        <div class="form-group full">
          <label>Adresse</label>
          <input type="text" id="faddress" required>
        </div>

        <div class="form-group">
          <label>Taille</label>
          <select id="fsize" required>
            <option value="">Choisir</option>
            <option>S</option>
            <option>M</option>
            <option>L</option>
            <option>XL</option>
          </select>
        </div>

        <div class="form-group">
          <label>Couleur</label>
          <select id="fcolor" required>
            <option value="">Choisir</option>
            <option>Black</option>
            <option>White</option>
            <option>Red</option>
            <option>Blue</option>
            <option>Green</option>
            <option>Gray</option>
            <option>Beige</option>
            <option>Brown</option>
            <option>Navy</option>
            <option>Pink</option>
          </select>
        </div>

        <div class="form-group full">
          <label>Quantité</label>
          <input type="number" id="fqty" min="1" value="1" required>
        </div>

      </div>

      <div class="delivery-box">
        <div class="delivery-opt selected" onclick="selectDelivery(this,400)">
          Bureau (400 DA)
        </div>
        <div class="delivery-opt" onclick="selectDelivery(this,700)">
          Domicile (700 DA)
        </div>
      </div>

      <div class="total-box">
        Total: <span id="totalPrice">8,900</span> DA
      </div>

      <br>
      <button type="submit">Confirmer la commande</button>
    </form>
  </div>
</section>

<div class="success-overlay" id="successOverlay">
  <div class="success-box">
    <h2>Commande confirmée ✅</h2>
    <p>Nous vous contacterons dans 24h.</p>
    <button onclick="closeSuccess()">Retour</button>
  </div>
</div>

<script>
const BASE = 8500;
let deliveryFee = 400;

function updateTotal(){
  const qty = document.getElementById("fqty").value || 1;
  document.getElementById("totalPrice").textContent =
    ((BASE + deliveryFee) * qty).toLocaleString("fr-DZ");
}

function selectDelivery(el,fee){
  document.querySelectorAll(".delivery-opt").forEach(d=>d.classList.remove("selected"));
  el.classList.add("selected");
  deliveryFee = fee;
  updateTotal();
}

document.getElementById("fqty").addEventListener("input",updateTotal);
updateTotal();

async function submitOrder(e){
  e.preventDefault();

  const payload = {
    access_key:"YOUR_WEB3FORMS_KEY",
    _subject:"Nouvelle commande JACKETS.DZ",
    Nom:fname.value,
    Telephone:fphone.value,
    Adresse:faddress.value,
    Taille:fsize.value,
    Couleur:fcolor.value,
    Quantite:fqty.value,
    Livraison:deliveryFee===400?"Bureau":"Domicile",
    Total:document.getElementById("totalPrice").textContent+" DA"
  };

  const res = await fetch("https://api.web3forms.com/submit",{
    method:"POST",
    headers:{
      "Content-Type":"application/json",
      "Accept":"application/json"
    },
    body:JSON.stringify(payload)
  });

  if(res.ok){
    document.getElementById("successOverlay").style.display="flex";
  }else{
    alert("Erreur lors de l'envoi");
  }
}

function closeSuccess(){
  document.getElementById("successOverlay").style.display="none";
  document.querySelector("form").reset();
  deliveryFee=400;
  document.querySelectorAll(".delivery-opt")[0].classList.add("selected");
  updateTotal();
}
</script>

</body>
</html>
