```html
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Online Jacket Store</title>

<style>

body{
  margin:0;
  font-family:Arial, sans-serif;
  background:#f4f4f4;
}

header{
  background:black;
  color:white;
  padding:20px;
  text-align:center;
}

.hero{
  background:url('https://images.unsplash.com/photo-1520975922321-c5b6b3b3a4f3');
  background-size:cover;
  background-position:center;
  height:400px;
  display:flex;
  align-items:center;
  justify-content:center;
  color:white;
  text-align:center;
}

.hero h1{
  background:rgba(0,0,0,0.6);
  padding:20px;
  border-radius:10px;
}

.section{
  padding:60px 20px;
  text-align:center;
}

.products{
  display:flex;
  flex-wrap:wrap;
  justify-content:center;
  gap:20px;
}

.product{
  background:white;
  padding:20px;
  width:250px;
  border-radius:12px;
  box-shadow:0 5px 15px rgba(0,0,0,0.1);
}

.product img{
  width:100%;
  border-radius:8px;
}

form{
  max-width:500px;
  margin:0 auto;
  background:white;
  padding:25px;
  border-radius:12px;
  box-shadow:0 5px 15px rgba(0,0,0,0.1);
}

input, select, textarea{
  width:100%;
  padding:12px;
  margin:10px 0;
  border-radius:8px;
  border:1px solid #ccc;
}

button{
  width:100%;
  padding:15px;
  background:black;
  color:white;
  border:none;
  border-radius:8px;
  font-size:16px;
  cursor:pointer;
}

button:hover{
  background:#333;
}

.success{
  display:none;
  margin-top:15px;
  background:#d4edda;
  padding:10px;
  border-radius:6px;
  color:#155724;
}

footer{
  background:black;
  color:white;
  text-align:center;
  padding:20px;
  margin-top:40px;
}

@media(max-width:768px){
  .products{
    flex-direction:column;
    align-items:center;
  }
}

</style>
</head>

<body>

<header>
  <h2>Online Jacket Store</h2>
</header>

<section class="hero">
  <h1>Premium Jackets Collection 2026</h1>
</section>

<section class="section">
  <h2>Our Jackets</h2>
  <div class="products">
    <div class="product">
      <img src="https://images.unsplash.com/photo-1544441893-675973e31985">
      <h3>Classic Black Jacket</h3>
    </div>
    <div class="product">
      <img src="https://images.unsplash.com/photo-1520975918318-6f9d66bdfc3f">
      <h3>Modern Winter Jacket</h3>
    </div>
  </div>
</section>

<section class="section" style="background:#eaeaea;">
  <h2>Order Now</h2>

  <form id="orderForm" action="https://api.web3forms.com/submit" method="POST">

    <input type="hidden" name="access_key" value="30674636-aca2-4f7c-952c-c3bd20a45594">
    <input type="hidden" name="subject" value="New Jacket Order">

    <input type="text" name="name" placeholder="Full Name" required>
    <input type="tel" name="phone" placeholder="Phone Number" required>
    <input type="text" name="city" placeholder="City" required>

    <select name="size" required>
      <option value="">Select Size</option>
      <option>S</option>
      <option>M</option>
      <option>L</option>
      <option>XL</option>
    </select>

    <select name="color" required>
      <option value="">Select Color</option>
      <option>Black</option>
      <option>Brown</option>
      <option>Grey</option>
      <option>Blue</option>
      <option>Navy</option>
      <option>Green</option>
      <option>Red</option>
      <option>White</option>
      <option>Beige</option>
      <option>Dark Grey</option>
    </select>

    <input type="number" name="quantity" placeholder="Quantity" min="1" required>
    <textarea name="address" placeholder="Delivery Address" required></textarea>

    <button type="submit">Place Order</button>

    <div class="success" id="successMessage">
      ✅ Order Sent Successfully!
    </div>

  </form>
</section>

<footer>
  © 2026 Online Jacket Store
</footer>

<script>
const form = document.getElementById("orderForm");
const successMessage = document.getElementById("successMessage");

form.addEventListener("submit", function(e) {
  e.preventDefault();

  if(form.checkValidity()) {
    fetch(form.action, {
      method: "POST",
      body: new FormData(form)
    })
    .then(response => {
      if(response.ok){
        form.reset();
        successMessage.style.display = "block";
      } else {
        alert("Error sending order.");
      }
    })
    .catch(() => {
      alert("Network error.");
    });
  }
});
</script>

</body>
</html>
